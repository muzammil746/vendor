<!DOCTYPE html>
<html>

    <head>

    </head>

    <body>

        <div class="container">

            <h1>Add Milk Entry</h1>

            <!--Customer Dropdown-->

            <br>

            <select id="customerSelect"></select>

            <br><br>

            <label>Date</label>

            <input type="date" id="date">
            <br><br>

            <label>Quantity</label>

            <br>

            <input type="number" id="rate" placeholder="enter rate">

            <!--Submit Button-->
            <button onclick="addMilk()">Add Milk</button>
        
        </div>

        <script src="script.js"></script>
        <script>
            loadCustomersDropdown();
        </script>


    </body>
</html>
